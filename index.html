<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#007A49">
<title>Auditoría Comercial · Feu Vert</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:'Plus Jakarta Sans',system-ui,-apple-system,'Segoe UI',sans-serif;-webkit-font-smoothing:antialiased;background:#D7DCD9;-webkit-text-size-adjust:100%}
  input,textarea,select,button{font-family:inherit}
  textarea,input{outline:none}
  button{-webkit-tap-highlight-color:transparent}
  .scr::-webkit-scrollbar{width:0;height:0}
  @keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes toastIn{from{opacity:0;transform:translate(-50%,10px)}to{opacity:1;transform:translate(-50%,0)}}
</style>
</head>
<body>
<div style="display:flex;justify-content:center;align-items:flex-start;background:#D7DCD9;min-height:100vh;padding:0">
  <div class="scr" id="app" style="width:100%;max-width:412px;min-height:100vh;background:#EEF1EF;position:relative;overflow:hidden;box-shadow:0 0 60px rgba(0,0,0,.12)">
    <!-- Fallback visible si JavaScript está desactivado (p.ej. Vista rápida de Archivos en iPhone) -->
    <div id="boot" style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:34px 26px;background:linear-gradient(168deg,#007A49,#06A869);color:#fff">
      <div style="font-style:italic;font-weight:800;font-size:32px;letter-spacing:-.6px">Feu Vert</div>
      <div style="font-size:12px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;opacity:.85;margin-top:6px">Auditoría de centro</div>
      <div style="margin-top:26px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.25);border-radius:16px;padding:18px 18px;max-width:320px">
        <div style="font-size:15px;font-weight:800;margin-bottom:10px">Ábrela en Safari</div>
        <div style="font-size:13.5px;font-weight:500;line-height:1.5;opacity:.95;text-align:left">
          Si ves esta pantalla, estás en la <b>Vista rápida</b> de Archivos, que no ejecuta la app.<br><br>
          1 · Toca el icono <b>compartir</b> (cuadro con flecha ↑).<br>
          2 · Elige <b>«Abrir en Safari»</b>.<br><br>
          O añádela a la <b>pantalla de inicio</b> desde Safari para usarla como app.
        </div>
      </div>
    </div>
  </div>
</div>
<noscript>
  <div style="position:fixed;inset:0;background:#007A49;color:#fff;display:flex;align-items:center;justify-content:center;text-align:center;padding:30px;font-family:-apple-system,system-ui,sans-serif;z-index:99999">
    <div><div style="font-style:italic;font-weight:800;font-size:30px">Feu Vert</div><div style="margin-top:14px;font-size:15px;line-height:1.5;max-width:300px">Esta app necesita JavaScript.<br>Ábrela en <b>Safari</b> (Compartir → Abrir en Safari).</div></div>
  </div>
</noscript>

<!-- PDF libs (opcionales, solo para exportar el informe; la app funciona sin red) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" async></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" async></script>

<script>
"use strict";
window.onerror = function(msg, src, line, col){
  try{
    var d=document.getElementById('app')||document.body;
    d.innerHTML='<div style="padding:30px;font:14px/1.5 -apple-system,system-ui,sans-serif;color:#2a1215">'
      +'<b>Se produjo un error al iniciar.</b><br><br>'+String(msg)+'<br>línea '+line+':'+col
      +'<br><br>Prueba a recargar la página en Safari.</div>';
  }catch(e){}
  return false;
};
(function(){
  var STATUS = {
    ok:       { label:'Correcto',   color:'#1B8C4E', bg:'#E6F4EC' },
    warn:     { label:'Atención',   color:'#CE8500', bg:'#FBF1DA' },
    bad:      { label:'Incidencia', color:'#CC3340', bg:'#FBE7E9' },
    progress: { label:'En curso',   color:'#3B7DD8', bg:'#E9F1FB' },
    pending:  { label:'Pendiente',  color:'#8A938E', bg:'#F0F2F1' }
  };
  var TEAM = ['Director','Jefe de Tienda','Jefe de Taller','Jefe de Servicio Regional','Coordinador de flotas','Director Regional','Otro'];
  var CENTERS = ['Valladolid','León','Alfonso Molina','Lugo','Ourense','Zamora','Valladolid II','Renfe','Oleiros','Ponferrada','Marineda','Ferrol','Arteixo','Vigo'];
  var ICON_DEF = {
    store:{paths:['M3 9l1.5-5h15L21 9','M4.5 9v10h15V9','M9 19v-5h6v5']},
    box:{paths:['M3 7l9-4 9 4-9 4-9-4z','M3 7v10l9 4 9-4V7','M12 11v10']},
    user:{circles:[[12,8,3.6]],paths:['M4.5 20v-1a7.5 7.5 0 0115 0v1']},
    monitor:{rects:[[3,4,18,13,2]],paths:['M8 21h8M12 17v4']},
    wrench:{circles:[[12,12,3]],paths:['M12 2v3M12 19v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M2 12h3M19 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1']},
    users:{circles:[[9,8,3.2]],paths:['M2.5 20v-1a6.5 6.5 0 0113 0v1','M16 5.3a3.2 3.2 0 010 5.9M22 20v-1a6 6 0 00-4-5.6']}
  };
  function icon(name, size){
    size = size||20;
    var d = ICON_DEF[name]||ICON_DEF.box, inner='';
    (d.circles||[]).forEach(function(c){ inner+='<circle cx="'+c[0]+'" cy="'+c[1]+'" r="'+c[2]+'"/>'; });
    (d.rects||[]).forEach(function(r){ inner+='<rect x="'+r[0]+'" y="'+r[1]+'" width="'+r[2]+'" height="'+r[3]+'" rx="'+r[4]+'"/>'; });
    (d.paths||[]).forEach(function(p){ inner+='<path d="'+p+'"/>'; });
    return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">'+inner+'</svg>';
  }
  var DEFAULT_AREAS = [
    { id:'comercial', name:'Presencia Comercial', icon:'store', elements:[
      { id:'c1', name:'Presencia comercial, islas, masificaciones y balizaje' },
      { id:'c2', name:'Promociones comerciales al día' }
    ]},
    { id:'stock', name:'Stock', icon:'box', elements:[
      { id:'s1', name:'Nivel de stock adecuado' }
    ]},
    { id:'atencion', name:'Atención al Cliente', icon:'user', elements:[
      { id:'a1', name:'Atención en caja técnica' },
      { id:'a2', name:'Análisis Mistery Shopper' },
      { id:'a3', name:'Gestión de rechazos' }
    ]},
    { id:'gestion', name:'Gestión y Sistemas', icon:'monitor', elements:[
      { id:'g1', name:'Uso del programa de gestión (presupuestos)' },
      { id:'g2', name:'Manejo del panel' },
      { id:'g3', name:'Uso del smartphone' }
    ]},
    { id:'taller', name:'Taller', icon:'wrench', elements:[
      { id:'t1', name:'Ritmo y productividad de taller' }
    ]},
    { id:'equipo', name:'Equipo', icon:'users', elements:[
      { id:'e1', name:'Organización de horarios según demanda de clientes' },
      { id:'e2', name:"Equipo, horarios y ET's" }
    ]}
  ];
  var STORE_KEY = 'fv_audit_v1';

  function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function escA(s){ return esc(s).replace(/"/g,'&quot;'); }
  function clone(o){ return JSON.parse(JSON.stringify(o)); }
  // Comprime/redimensiona una imagen a JPEG para que quepa en localStorage y persista al cerrar la app
  function compressImage(file, cb){
    var fr=new FileReader();
    fr.onload=function(){
      var img=new Image();
      img.onload=function(){
        var MAX=1280, w=img.width, h=img.height;
        if(w>h && w>MAX){ h=Math.round(h*MAX/w); w=MAX; }
        else if(h>=w && h>MAX){ w=Math.round(w*MAX/h); h=MAX; }
        var c=document.createElement('canvas'); c.width=w; c.height=h;
        c.getContext('2d').drawImage(img,0,0,w,h);
        try{ cb(c.toDataURL('image/jpeg',0.72)); }catch(e){ cb(fr.result); }
      };
      img.onerror=function(){ cb(fr.result); };
      img.src=fr.result;
    };
    fr.readAsDataURL(file);
  }

  var state = {
    screen:'home', homeVariant:0, areaId:null, elementId:null,
    areas: clone(DEFAULT_AREAS), evals:{},
    editing:false, homeEditing:false, showEmail:false, showCenter:false, centerMode:'change', toast:'', busy:false,
    center:'Valladolid',
    emailTo:'direccion.centro@feuvert.es', emailSubject:'',
    history:[], savedView:null, statCenter:null, returnTo:'dashboard'
  };

  // ---- Almacenamiento: IndexedDB (gran capacidad) con respaldo a localStorage ----
  var DB_NAME='fv_audit_db', DB_STORE='kv', DB_KEY='state';
  function idbOpen(cb){
    try{
      if(!window.indexedDB){ cb('no-idb'); return; }
      var req=indexedDB.open(DB_NAME,1);
      req.onupgradeneeded=function(){ try{ req.result.createObjectStore(DB_STORE); }catch(e){} };
      req.onsuccess=function(){ cb(null,req.result); };
      req.onerror=function(){ cb(req.error||'err'); };
    }catch(e){ cb(e); }
  }
  function idbGet(cb){
    idbOpen(function(err,db){ if(err){ cb(err); return; }
      try{ var tx=db.transaction(DB_STORE,'readonly'); var r=tx.objectStore(DB_STORE).get(DB_KEY);
        r.onsuccess=function(){ cb(null,r.result); }; r.onerror=function(){ cb(r.error||'err'); };
      }catch(e){ cb(e); }
    });
  }
  function idbSet(val,cb){
    idbOpen(function(err,db){ if(err){ cb&&cb(err); return; }
      try{ var tx=db.transaction(DB_STORE,'readwrite'); tx.objectStore(DB_STORE).put(val,DB_KEY);
        tx.oncomplete=function(){ cb&&cb(null); }; tx.onerror=function(){ cb&&cb(tx.error||'err'); };
      }catch(e){ cb&&cb(e); }
    });
  }
  function snapshotData(){ return {areas:state.areas,evals:state.evals,center:state.center,history:state.history}; }
  function applyData(d){
    if(!d) return;
    if(d.areas&&d.areas.length) state.areas=d.areas;
    state.evals=d.evals||{};
    state.center=d.center||'Valladolid';
    state.history=d.history||[];
    // Migración: foto única -> array de fotos
    Object.keys(state.evals).forEach(function(id){ var ev=state.evals[id]; if(!ev) return; if(!ev.photos){ ev.photos = ev.photo ? [ev.photo] : []; } delete ev.photo; });
  }
  function loadStore(done){
    idbGet(function(err,d){
      if(!err && d){ applyData(d); done&&done(); return; }
      // Sin datos en IndexedDB: migrar desde localStorage si existieran
      try{ var raw=localStorage.getItem(STORE_KEY); if(raw){ applyData(JSON.parse(raw)); idbSet(snapshotData()); } }catch(e){}
      done&&done();
    });
  }
  var persistWarned=false;
  function persist(){
    idbSet(snapshotData(), function(err){
      if(err){
        // Respaldo a localStorage (puede fallar por tamaño, pero IndexedDB es lo habitual)
        try{ localStorage.setItem(STORE_KEY, JSON.stringify(snapshotData())); }
        catch(e){ if(!persistWarned){ persistWarned=true; flash('No se pudo guardar el almacenamiento.'); } }
      }
    });
  }

  function uid(p){ return (p||'x') + Math.random().toString(36).slice(2,7); }
  function getEval(id){ return state.evals[id] || {status:'pending',score:0,comment:'',action:'',responsible:'Director',due:'',photos:[]}; }
  function patchEval(id, patch, doRender){
    var cur=getEval(id); var next={}; for(var k in cur) next[k]=cur[k]; for(var k2 in patch) next[k2]=patch[k2];
    state.evals[id]=next; persist(); if(doRender!==false) render();
  }
  var toastT;
  function flash(msg){ state.toast=msg; render(); clearTimeout(toastT); toastT=setTimeout(function(){ state.toast=''; render(); },2600); }

  function today(){
    var M=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
    var d=new Date(), pad=function(n){return String(n).padStart(2,'0');};
    return { iso:d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()), label:d.getDate()+' '+M[d.getMonth()]+' '+d.getFullYear() };
  }
  function fmtDate(d){ if(!d) return 'Sin fecha'; var p=d.split('-'); return p.length===3? p[2]+'/'+p[1]+'/'+p[0] : d; }

  function areaStat(area){
    var ok=0,warn=0,bad=0,evald=0, total=area.elements.length;
    area.elements.forEach(function(el){ var e=getEval(el.id); if(e.status!=='pending'){ evald++; if(e.status==='ok')ok++; else if(e.status==='warn')warn++; else bad++; } });
    var key = bad?'bad': warn?'warn': (total>0&&evald===total)?'ok': evald>0?'progress':'pending';
    return {ok:ok,warn:warn,bad:bad,evald:evald,total:total,key:key,pct: total? Math.round(evald/total*100):0};
  }

  function computeReport(areas, evals, center){
    var t=today();
    var biz={ name:'Feu Vert '+center, center:center, location:'Centro '+center, date:t.label, dateISO:t.iso, auditor:'Director Regional', fileName:'FeuVert_'+center.replace(/\s+/g,'_') };
    var ok=0,warn=0,bad=0,evald=0,total=0,sum=0;
    areas.forEach(function(a){ a.elements.forEach(function(el){ total++; var e=evals[el.id]||{status:'pending'};
      if(e.status&&e.status!=='pending'){ evald++; sum+=(e.status==='ok'?100:e.status==='warn'?60:20); if(e.status==='ok')ok++; else if(e.status==='warn')warn++; else bad++; } }); });
    var score = evald? Math.round(sum/evald):0;
    var oColor = evald===0?'#8A938E': score>=80?'#1B8C4E': score>=55?'#CE8500':'#CC3340';
    var oBg    = evald===0?'#F0F2F1': score>=80?'#E6F4EC': score>=55?'#FBF1DA':'#FBE7E9';
    var oLabel = evald===0?'Sin evaluar': score>=80?'Buen estado': score>=55?'Mejorable':'Crítico';
    var overall = { ok:ok,warn:warn,bad:bad,evaluated:evald,total:total,score:score, scoreLabel: evald? String(score):'—', color:oColor, bg:oBg, label:oLabel,
      completionPct:(total?Math.round(evald/total*100):0)+'%',
      ring:'conic-gradient('+oColor+' '+(score*3.6)+'deg, #E6EAE8 0deg)',
      ringLight:'conic-gradient(#fff '+(score*3.6)+'deg, rgba(255,255,255,.25) 0deg)' };
    // Solo áreas analizadas (con al menos un punto evaluado) y, dentro de ellas, solo los puntos evaluados
    var groups = areas.map(function(a){
      var items = a.elements.filter(function(el){ var e=evals[el.id]||{}; return e.status && e.status!=='pending'; })
        .map(function(el){ var e=evals[el.id]||{status:'pending'}; var m=STATUS[e.status]||STATUS.pending;
          return { name:el.name, color:m.color, statusLabel:m.label,
            scoreText:'',
            comment:e.comment||'', hasComment:!!(e.comment), photos:(e.photos&&e.photos.length)?e.photos:(e.photo?[e.photo]:[]) }; });
      return { name:a.name, items:items };
    }).filter(function(g){ return g.items.length>0; });
    var actionPlan=[];
    areas.forEach(function(a){ a.elements.forEach(function(el){ var e=evals[el.id]||{};
      if(e.status==='bad'||e.status==='warn'){ var m=STATUS[e.status];
        actionPlan.push({ name:el.name, action:e.action||'Definir acción correctiva', color:m.color,
          responsible:e.responsible||'Director', dueText:fmtDate(e.due) }); } }); });
    return { biz:biz, overall:overall, groups:groups, actionPlan:actionPlan };
  }

  function buildSnapshot(){
    var rep=computeReport(state.areas,state.evals,state.center);
    if(rep.overall.evaluated===0) return null;
    var id=state.center+'|'+rep.biz.dateISO;
    var snap={ id:id, center:state.center, dateISO:rep.biz.dateISO, dateLabel:rep.biz.date, savedAt:Date.now(),
      biz:rep.biz, overall:rep.overall, groups:rep.groups, actionPlan:rep.actionPlan,
      evals:clone(state.evals), areas:clone(state.areas) };
    state.history = [snap].concat(state.history.filter(function(h){ return h.id!==id; }));
    return snap;
  }
  // Guarda la auditoría en el historial SIN perder los cambios en curso (se puede seguir editando)
  function commitSave(){
    var snap=buildSnapshot();
    if(!snap){ flash('Evalúa al menos un punto para guardar'); return null; }
    state.savedView=snap;
    persist();
    return snap;
  }

  // ---- navegación / acciones ----
  var ACT = {
    goHome:function(){ state.screen='home'; state.editing=false; state.homeEditing=false; state.savedView=null; render(); },
    goArea:function(){ state.screen='area'; state.editing=false; render(); },
    goStats:function(){ state.screen='stats'; state.savedView=null; render(); },
    finalize:function(){ var snap=commitSave(); if(!snap) return; state.screen='dashboard'; state.returnTo='dashboard'; render(); },
    saveAndStay:function(){ var s=commitSave(); if(s) flash('Auditoría guardada ✓'); render(); },
    gotoPdf:function(){ state.screen='pdf'; state.returnTo='dashboard'; render(); },
    pdfBack:function(){ state.screen=state.returnTo||'dashboard'; if(state.screen!=='dashboard') state.savedView=null; render(); },
    toggleEdit:function(){ state.editing=!state.editing; render(); },
    toggleHomeEdit:function(){ state.homeEditing=!state.homeEditing; render(); },
    addAreaHome:function(){ var id=uid('area'); state.areas.push({id:id,name:'Nueva área',icon:'box',elements:[]}); persist(); render(); },
    addArea:function(){ var id=uid('area'); state.areas.push({id:id,name:'Nueva área',icon:'box',elements:[]}); state.areaId=id; state.screen='area'; state.editing=true; persist(); render(); },
    removeArea:function(){ var id=state.areaId; state.areas=state.areas.filter(function(a){return a.id!==id;}); state.screen='home'; state.editing=false; persist(); render(); },
    addElement:function(){ var aId=state.areaId, id=uid('el'); state.areas.forEach(function(a){ if(a.id===aId) a.elements.push({id:id,name:'Nuevo punto de control'}); }); state.elementId=id; state.screen='element'; persist(); render(); },
    openCenter:function(){ state.centerMode='change'; state.showCenter=true; render(); },
    closeCenter:function(){ state.showCenter=false; render(); },
    openEmail:function(){ state.showEmail=true; render(); },
    closeEmail:function(){ state.showEmail=false; render(); },
    backFromDetail:function(){ state.screen='stats'; render(); },
    // NUEVA AUDITORÍA: limpia todos los items y abre el selector de centro
    newAudit:function(){ state.evals={}; state.savedView=null; state.areaId=null; state.elementId=null; state.editing=false; state.homeEditing=false; state.screen='home'; state.centerMode='new'; state.showCenter=true; persist(); render(); },
    downloadPdf:function(){ doDownloadPdf(); },
    sendEmail:function(){ doSendEmail(); }
  };

  function dispatch(act, t){
    if(ACT[act]){ ACT[act](); return; }
    if(act==='variant'){ state.homeVariant=parseInt(t.dataset.variant,10); render(); return; }
    if(act==='openArea'){ state.screen='area'; state.areaId=t.dataset.id; state.editing=false; render(); return; }
    if(act==='openElement'){ state.screen='element'; state.elementId=t.dataset.id; render(); return; }
    if(act==='removeElement'){ var id=t.dataset.id, aId=state.areaId; delete state.evals[id]; state.areas.forEach(function(a){ if(a.id===aId) a.elements=a.elements.filter(function(e){return e.id!==id;}); }); persist(); render(); return; }
    if(act==='removeAreaHome'){ var rid=t.dataset.id; state.areas=state.areas.filter(function(a){return a.id!==rid;}); persist(); render(); return; }
    if(act==='status'){ patchEval(state.elementId,{status:t.dataset.status}); return; }
    if(act==='score'){ patchEval(state.elementId,{score:parseInt(t.dataset.n,10)}); return; }
    if(act==='removePhoto'){ patchEval(state.elementId,{photos:[]}); return; }
    if(act==='removePhotoAt'){ var idx=parseInt(t.dataset.n,10); var ph=(getEval(state.elementId).photos||[]).slice(); ph.splice(idx,1); patchEval(state.elementId,{photos:ph}); return; }
    if(act==='pickCenter'){ var name=t.dataset.name; var wasNew=state.centerMode==='new'; state.center=name; state.showCenter=false; persist(); render(); if(wasNew) flash('Nueva auditoría · Feu Vert '+name); return; }
    if(act==='openCenterDetail'){ state.screen='centerDetail'; state.statCenter=t.dataset.center; render(); return; }
    if(act==='openSavedReport'){ var h=findHistory(t.dataset.id); if(h){ state.savedView=h; state.screen='pdf'; state.returnTo='centerDetail'; render(); } return; }
    if(act==='reopenAudit'){ var ra=findHistory(t.dataset.id); if(ra){ state.evals=ra.evals?clone(ra.evals):{}; if(ra.areas&&ra.areas.length) state.areas=clone(ra.areas); state.center=ra.center; state.savedView=null; state.areaId=null; state.elementId=null; state.editing=false; state.homeEditing=false; state.screen='home'; persist(); render(); flash('Continuando auditoría · '+ra.dateLabel); } return; }
    if(act==='removeAudit'){ state.history=state.history.filter(function(h){return h.id!==t.dataset.id;}); persist(); render(); return; }
  }
  function findHistory(id){ for(var i=0;i<state.history.length;i++) if(state.history[i].id===id) return state.history[i]; return null; }

  // ---- PDF / email ----
  function evidenceList(rep){
    var out=[];
    rep.groups.forEach(function(g){ g.items.forEach(function(it){ if(it.photos&&it.photos.length){ it.photos.forEach(function(p){ out.push({area:g.name, name:it.name, color:it.color, status:it.statusLabel, src:p}); }); } }); });
    return out;
  }
  function buildPdfDoc(){
    return new Promise(function(resolve,reject){
      if(!window.html2canvas || !window.jspdf){ reject(new Error('libs')); return; }
      var pages=Array.prototype.slice.call(document.querySelectorAll('.a4-page'));
      if(!pages.length){ reject(new Error('no-target')); return; }
      var JsPDF=window.jspdf.jsPDF;
      var pdf=new JsPDF({unit:'mm',format:'a4',orientation:'portrait'});
      var SCALE=2, PAGE_H=1123*SCALE; // alto de una A4 en píxeles del canvas
      var first=true, i=0;
      function addSlices(canvas){
        var total=canvas.height, n=Math.max(1,Math.ceil((total-6)/PAGE_H));
        for(var p=0;p<n;p++){
          var sh=Math.min(PAGE_H, total-p*PAGE_H);
          var pc=document.createElement('canvas'); pc.width=canvas.width; pc.height=PAGE_H;
          var ctx=pc.getContext('2d'); ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,pc.width,pc.height);
          ctx.drawImage(canvas, 0, p*PAGE_H, canvas.width, sh, 0, 0, canvas.width, sh);
          if(!first) pdf.addPage('a4','portrait');
          first=false;
          pdf.addImage(pc.toDataURL('image/jpeg',0.92),'JPEG',0,0,210,297,undefined,'FAST');
        }
      }
      function next(){
        if(i>=pages.length){ resolve(pdf); return; }
        window.html2canvas(pages[i],{scale:SCALE,backgroundColor:'#ffffff',useCORS:true,windowWidth:794}).then(function(canvas){
          addSlices(canvas); i++; next();
        }).catch(reject);
      }
      next();
    });
  }

  function render(){
    var app=document.getElementById('app');
    var html='';
    var s=state.screen;
    if(s==='home') html+=renderHome();
    else if(s==='area') html+=renderArea();
    else if(s==='element') html+=renderElement();
    else if(s==='dashboard') html+=renderDashboard();
    else if(s==='stats') html+=renderStats();
    else if(s==='centerDetail') html+=renderCenterDetail();
    else if(s==='pdf') html+=renderPdf();

    if(state.showEmail) html+=renderEmail();
    if(state.showCenter) html+=renderCenterPicker();
    if(s==='home'||s==='stats') html+=renderNav();
    if(state.toast) html+='<div style="position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#14241B;color:#fff;padding:13px 20px;border-radius:13px;font-size:13.5px;font-weight:700;z-index:60;animation:toastIn .3s ease;box-shadow:0 10px 30px rgba(0,0,0,.3);white-space:nowrap">'+esc(state.toast)+'</div>';

    app.innerHTML=html;

    groups.forEach(function(g){ h+='<div style="margin-bottom:15px"><div style="font-size:13px;font-weight:800;color:#007A49;margin-bottom:6px;padding-bottom:5px;border-bottom:1px solid #E6EAE8">'+esc(g.name)+'</div>'; g.items.forEach(function(it){ h+='<div style="display:flex;gap:8px;align-items:flex-start;padding:4px 0"><span style="width:8px;height:8px;border-radius:50%;background:'+it.color+';flex:none;margin-top:5px"></span><div style="flex:1;min-width:0"><div style="font-size:11.5px;font-weight:600;color:#1A2520;line-height:1.3">'+esc(it.name)+'</div>'+(it.hasComment?'<div style="font-size:10.5px;color:#9AA39E;margin-top:1px;line-height:1.25">'+esc(it.comment)+'</div>':'')+'</div><span style="font-size:10.5px;font-weight:800;color:'+it.color+';flex:none;white-space:nowrap">'+esc(it.statusLabel)+esc(it.scoreText)+'</span></div>'; }); h+='</div>'; });
    h+='</div></div>';
    if(ap.length){ h+='<div style="padding:4px 40px 0"><div style="font-size:12px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:#8A938E;margin-bottom:10px">Plan de acción</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px 32px;align-items:start">'; ap.forEach(function(p){ h+='<div style="border-left:3px solid '+p.color+';padding:4px 0 4px 11px"><div style="font-size:11.5px;font-weight:700;color:#1A2520;line-height:1.25">'+esc(p.name)+'</div><div style="font-size:10.5px;color:#69756E;margin-top:1px;line-height:1.25">'+esc(p.action)+' · <b>'+esc(p.responsible)+'</b> · '+esc(p.dueText)+'</div></div>'; }); h+='</div></div>'; }
    h+='<div style="margin-top:auto;padding:14px 40px;border-top:1px solid #ECEFED;display:flex;justify-content:space-between;font-size:10px;color:#A6AEA9;font-weight:600"><span>Feu Vert · Auditoría Comercial de Centro</span><span>Generado el '+esc(biz.date)+'</span></div>';
    h+='</div>';
    return h;
  }

  // Páginas A4 de evidencia fotográfica (6 fotos por página, tamaño contenido)
  function renderA4Photos(rep){
    var ev=evidenceList(rep);
    if(!ev.length) return '';
    var perPage=6, pages=Math.ceil(ev.length/perPage), out='';
    for(var pg=0; pg<pages; pg++){
      var slice=ev.slice(pg*perPage,(pg+1)*perPage);
      out+='<div class="a4-page" style="position:fixed;left:-10000px;top:0;width:794px;height:1123px;background:#fff;color:#1A2520;font-family:\'Plus Jakarta Sans\',sans-serif;overflow:hidden">';
      out+='<div style="background:linear-gradient(135deg,#007A49,#06A869);color:#fff;padding:24px 40px"><div style="display:flex;justify-content:space-between;align-items:center"><img src="'+LOGO+'" alt="Feu Vert" style="height:24px;width:auto;display:block" /><div style="font-size:11px;font-weight:700;letter-spacing:.16em;opacity:.92">EVIDENCIA FOTOGRÁFICA'+(pages>1?' · '+(pg+1)+'/'+pages:'')+'</div></div></div>';
      out+='<div style="padding:28px 40px;display:grid;grid-template-columns:1fr 1fr;gap:22px 28px;align-content:start">';
      slice.forEach(function(it){
        out+='<div><div style="width:100%;height:300px;border-radius:12px;overflow:hidden;background:#F0F2F1;border:1px solid #E6EAE8"><img src="'+escA(it.src)+'" style="width:100%;height:100%;object-fit:cover;display:block"/></div><div style="display:flex;align-items:center;gap:7px;margin-top:9px"><span style="width:8px;height:8px;border-radius:50%;background:'+it.color+';flex:none"></span><div style="font-size:11.5px;font-weight:700;color:#1A2520;line-height:1.25">'+esc(it.name)+'</div></div><div style="font-size:10px;font-weight:600;color:#9AA39E;margin-top:2px;padding-left:15px">'+esc(it.area)+'</div></div>';
      });
      out+='</div></div>';
    }
    return out;
  }

  function renderEmail(){
    var rep=curReport(), biz=rep.biz, ov=rep.overall;
    var subject=state.emailSubject || ('Informe de auditoría — '+biz.name+' — '+biz.date);
    var h='<div style="position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:50;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .2s ease"><div style="width:100%;max-width:412px;background:#fff;border-radius:24px 24px 0 0;padding:22px 20px calc(22px + env(safe-area-inset-bottom));animation:sheetUp .28s cubic-bezier(.2,.8,.2,1)"><div style="width:40px;height:4px;border-radius:99px;background:#DCE1DE;margin:0 auto 18px"></div><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><div style="font-size:18px;font-weight:800;color:#1A2520">Enviar informe</div><button data-act="closeEmail" style="background:#F0F2F1;border:none;width:32px;height:32px;border-radius:50%;font-size:17px;color:#69756E;cursor:pointer">×</button></div>';
    h+='<label style="font-size:12px;font-weight:700;color:#69756E;display:block;margin-bottom:6px">Para</label><input data-input="emailTo" value="'+escA(state.emailTo)+'" style="width:100%;border:1px solid #E3E8E5;border-radius:11px;padding:12px;font-size:14px;color:#1A2520;background:#FAFBFA;margin-bottom:13px"/>';
    h+='<label style="font-size:12px;font-weight:700;color:#69756E;display:block;margin-bottom:6px">Asunto</label><input data-input="emailSubject" value="'+escA(subject)+'" style="width:100%;border:1px solid #E3E8E5;border-radius:11px;padding:12px;font-size:14px;color:#1A2520;background:#FAFBFA;margin-bottom:13px"/>';
    h+='<div style="display:flex;align-items:center;gap:11px;background:#F2F5F3;border-radius:12px;padding:12px;margin-bottom:14px"><span style="width:38px;height:38px;border-radius:9px;background:#CC3340;color:#fff;display:grid;place-items:center;font-size:11px;font-weight:800;flex:none">PDF</span><div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:700;color:#1A2520">Informe_'+esc(biz.fileName)+'.pdf</div><div style="font-size:11.5px;color:#8A938E">'+ov.total+' puntos · '+rep.actionPlan.length+' acciones</div></div></div>';
    h+='<div style="font-size:11.5px;color:#8A938E;font-weight:500;line-height:1.4;margin-bottom:16px">En el móvil se abrirá el menú de compartir con el PDF adjunto. Si no está disponible, se abrirá tu app de correo con el resumen.</div>';
    h+='<button data-act="sendEmail" style="width:100%;background:#007A49;color:#fff;border:none;border-radius:14px;padding:16px;font-size:15px;font-weight:800;cursor:pointer">'+(state.busy?'Preparando…':'Enviar informe')+'</button>';
    h+='</div></div>';
    return h;
  }

  function renderCenterPicker(){
    var title = state.centerMode==='new' ? 'Nueva auditoría · elige centro' : 'Seleccionar centro';
    var h='<div style="position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:55;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .2s ease"><div style="width:100%;max-width:412px;background:#fff;border-radius:24px 24px 0 0;padding:22px 18px calc(18px + env(safe-area-inset-bottom));max-height:80vh;display:flex;flex-direction:column;animation:sheetUp .28s cubic-bezier(.2,.8,.2,1)"><div style="width:40px;height:4px;border-radius:99px;background:#DCE1DE;margin:0 auto 18px"></div><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding:0 2px"><div style="font-size:18px;font-weight:800;color:#1A2520">'+title+'</div><button data-act="closeCenter" style="background:#F0F2F1;border:none;width:32px;height:32px;border-radius:50%;font-size:17px;color:#69756E;cursor:pointer">×</button></div><div class="scr" style="overflow-y:auto;display:flex;flex-direction:column;gap:7px;padding:0 2px 2px">';
    CENTERS.forEach(function(name){ var sel=name===state.center; h+='<button data-act="pickCenter" data-name="'+escA(name)+'" style="display:flex;align-items:center;justify-content:space-between;width:100%;text-align:left;border:none;border-radius:12px;padding:14px 15px;font-size:14.5px;font-weight:700;cursor:pointer;'+(sel?'background:#E6F4EC;color:#007A49;':'background:#FAFBFA;color:#1A2520;')+'">Feu Vert '+esc(name)+(sel?'<span style="font-size:16px">✓</span>':'')+'</button>'; });
    h+='</div></div></div>';
    return h;
  }

  function renderNav(){
    function nb(on){ return 'flex:1;background:transparent;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:11px;font-weight:700;padding:4px 0;color:'+(on?'#007A49':'#9AA39E')+';'; }
    var h='<div style="position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:412px;background:#fff;border-top:1px solid #E4E9E6;display:flex;padding:9px 12px calc(9px + env(safe-area-inset-bottom));z-index:42;box-shadow:0 -6px 20px -14px rgba(0,0,0,.25)">';
    h+='<button data-act="goHome" style="'+nb(state.screen==='home')+'"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="12" height="17" rx="2"/><path d="M9 4V3a1 1 0 011-1h4a1 1 0 011 1v1"/><path d="M9 11h6M9 15h4"/></svg>Auditoría</button>';
    h+='<button data-act="goStats" style="'+nb(state.screen==='stats')+'"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20V4M4 20h16"/><rect x="7" y="11" width="3" height="6" rx="1"/><rect x="13" y="7" width="3" height="10" rx="1"/></svg>Informes</button>';
    h+='</div>';
    return h;
  }

  // ---- eventos ----
  var root=document.getElementById('app');
  root.addEventListener('click', function(e){
    var t=e.target.closest('[data-act]');
    if(!t || !root.contains(t)) return;
    dispatch(t.dataset.act, t);
  });
  root.addEventListener('input', function(e){
    var el=e.target, k=el.dataset.input; if(!k) return;
    if(k==='name'){ var aId=state.areaId; state.areas.forEach(function(a){ if(a.id===aId) a.elements.forEach(function(x){ if(x.id===state.elementId) x.name=el.value; }); }); persist(); }
    else if(k==='areaName'){ var aid=el.dataset.id; state.areas.forEach(function(a){ if(a.id===aid) a.name=el.value; }); persist(); }
    else if(k==='comment') patchEval(state.elementId,{comment:el.value},false);
    else if(k==='action') patchEval(state.elementId,{action:el.value},false);
    else if(k==='emailTo') state.emailTo=el.value;
    else if(k==='emailSubject') state.emailSubject=el.value;
  });
  root.addEventListener('change', function(e){
    var el=e.target, k=el.dataset.change; if(!k) return;
    if(k==='responsible') patchEval(state.elementId,{responsible:el.value},false);
    else if(k==='due') patchEval(state.elementId,{due:el.value},false);
    else if(k==='photo'){ var f=el.files&&el.files[0]; if(!f) return; compressImage(f,function(d){ patchEval(state.elementId,{photos:[d]}); }); }
    else if(k==='photos'){ var fs=el.files; if(!fs||!fs.length) return; var cur=(getEval(state.elementId).photos||[]).slice(); var room=10-cur.length; if(room<=0) return; var arr=Array.prototype.slice.call(fs,0,room); var pending=arr.length; arr.forEach(function(f){ compressImage(f,function(d){ cur.push(d); pending--; if(pending===0){ patchEval(state.elementId,{photos:cur}); } }); }); }
  });

  render();
  loadStore(function(){ render(); });
})();
</script>
</body>
</html>
